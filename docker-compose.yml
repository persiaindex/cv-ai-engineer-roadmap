services:
  db:
    image: public.ecr.aws/docker/library/postgres:17
    container_name: smartfeeder-db
    environment:
      POSTGRES_DB: cv_ai_db
      POSTGRES_USER: cv_ai_user
      POSTGRES_PASSWORD: cv_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartfeeder-api
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - apps/api/.env.docker
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: smartfeeder-web
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data: